<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZedPing - Key Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050508;
      --card: rgba(20, 20, 25, 0.6);
      --accent: #00e5ff;
      --text: #ffffff;
      --muted: #94a3b8;
      --red: #ff2d55;
      --border: rgba(255, 255, 255, 0.08);
      --gold: #ffd700;
      --green: #22c55e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 480px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px 28px;
      backdrop-filter: blur(24px);
    }

    .header {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo {
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.8rem;
      color: var(--accent);
      text-shadow: 0 0 20px var(--accent);
      letter-spacing: 4px;
    }

    .tagline {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-family: 'Share Tech Mono', monospace;
    }

    .sec-label {
      font-size: 0.62rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 10px;
      font-family: 'Share Tech Mono', monospace;
    }

    .key-info {
      background: linear-gradient(135deg, rgba(255, 215, 0, 0.1), rgba(255, 140, 0, 0.1));
      border: 2px solid var(--gold);
      border-radius: 14px;
      padding: 20px 16px;
      text-align: center;
      margin-bottom: 22px;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.15);
    }

    .key-duration {
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--gold);
      text-shadow: 0 0 14px rgba(255, 215, 0, 0.5);
      margin-bottom: 8px;
    }

    .key-links {
      font-size: 0.75rem;
      color: var(--muted);
      font-family: 'Share Tech Mono', monospace;
      letter-spacing: 1px;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 20px 0;
    }

    .input-group {
      margin-bottom: 22px;
    }

    .input-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 10px;
      font-family: 'Share Tech Mono', monospace;
      display: block;
    }

    .input-field {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--border);
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.4);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.95rem;
      transition: 0.2s;
    }

    .input-field:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 12px rgba(255, 215, 0, 0.2);
    }

    .input-field::placeholder {
      color: var(--muted);
    }

    .btn-gen {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--gold) 0%, #ff8c00 100%);
      color: #000;
      font-family: 'Share Tech Mono', monospace;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
    }

    .btn-gen:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(255, 215, 0, 0.4);
    }

    .btn-gen:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(0, 0, 0, 0.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .message-box {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 0.85rem;
      font-family: 'Share Tech Mono', monospace;
      display: none;
    }

    .message-box.error {
      background: rgba(255, 45, 85, 0.08);
      border: 1px solid rgba(255, 45, 85, 0.3);
      color: var(--red);
    }

    .message-box.success {
      background: rgba(34, 197, 94, 0.08);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: var(--green);
    }

    .message-box.show { display: block; }
  </style>
</head>

<body>
  <div class="card">
    <div class="header">
      <span class="logo">ZedPing Key⛈️</span>
    </div>

    <div class="key-info">
      <div class="key-duration">24H</div>
      <div class="key-links">✦ 2 LINKS ✦</div>
    </div>

    <div class="divider"></div>

    <button class="btn-gen" id="btnGen" onclick="generate()">
      <span class="btn-text">[ TẠO KEY 24H ]</span>
    </button>

    <div class="message-box" id="messageBox"></div>
  </div>

  <script>
    const API_ENDPOINT = "/api/generate";
    const selectedHours = 24;

    async function generate() {
      const btn = document.getElementById('btnGen');
      const msgBox = document.getElementById('messageBox');

      msgBox.className = 'message-box';
      msgBox.textContent = '';

      btn.disabled = true;
      btn.innerHTML = '<span class="btn-spinner"></span> ĐANG XỬ LÝ...';

      try {
        const res = await fetch(API_ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ hours: selectedHours })
        });

        const text = await res.text();
        if (!text) {
          throw new Error('API trả về response rỗng');
        }

        let data;
        try {
          data = JSON.parse(text);
        } catch (e) {
          console.error('Raw response:', text);
          throw new Error('API trả về không phải JSON: ' + text.substring(0, 100));
        }

        if (!res.ok || !data.success) {
          throw new Error(data.message || 'Lỗi tạo key');
        }

        window.location.href = data.url;

      } catch (err) {
        showError('❌ ' + err.message);
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<span class="btn-text">[ TẠO KEY 24H ]</span>';
      }
    }

    function showError(msg) {
      const box = document.getElementById('messageBox');
      box.textContent = msg;
      box.className = 'message-box error show';
    }

    function showSuccess(msg) {
      const box = document.getElementById('messageBox');
      box.textContent = msg;
      box.className = 'message-box success show';
    }
  </script>
</body>
</html>
