<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Key của bạn - ZedPing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f1117;
      --surface: #181c27;
      --border:  #2a2f3e;
      --accent:  #4f9eff;
      --accent2: #7c3aed;
      --text:    #e8eaf0;
      --muted:   #6b7280;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Sora', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(79,158,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,158,255,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
    }

    .logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 3px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 28px;
    }

    .msg-error {
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.3);
      border-radius: 10px;
      padding: 16px;
      color: #fca5a5;
      font-size: 13px;
      text-align: center;
      display: none;
    }

    .key-result {
      display: none;
      background: rgba(34,197,94,.06);
      border: 1px solid rgba(34,197,94,.25);
      border-radius: 12px;
      padding: 20px;
    }

    .key-result-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #4ade80;
      margin-bottom: 10px;
    }

    .key-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 1px;
      word-break: break-all;
      margin-bottom: 20px;
    }

    .copy-btn {
      width: 100%;
      padding: 12px;
      background: rgba(34,197,94,.12);
      border: 1px solid rgba(34,197,94,.3);
      border-radius: 8px;
      color: #4ade80;
      font-family: 'Sora', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }

    .copy-btn:hover { background: rgba(34,197,94,.22); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">ZedPing</div>
    <p class="subtitle">Key của bạn</p>

    <div class="msg-error" id="errMsg"></div>

    <div class="key-result" id="result">
      <div class="key-result-label">✅ Key hợp lệ</div>
      <div class="key-value" id="r-key"></div>
      <button class="copy-btn" onclick="copyKey()">📋 Sao chép Key</button>
    </div>
  </div>

  <script>
    const errMsg = document.getElementById("errMsg");
    const result = document.getElementById("result");

    const key = new URLSearchParams(location.search).get("key") || "";

    if (key) {
      document.getElementById("r-key").textContent = key;
      result.style.display = "block";
    } else {
      errMsg.textContent = "❌ Không tìm thấy key. Vui lòng quay lại và hoàn thành quảng cáo!";
      errMsg.style.display = "block";
    }

    function copyKey() {
      const cb = document.querySelector(".copy-btn");
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(key).then(() => {
          cb.textContent = "✅ Đã sao chép!";
          setTimeout(() => { cb.textContent = "📋 Sao chép Key"; }, 2000);
        });
      } else {
        // fallback mobile
        const tmp = document.createElement("textarea");
        tmp.value = key;
        document.body.appendChild(tmp);
        tmp.select(); tmp.setSelectionRange(0, 99999);
        document.execCommand("copy");
        document.body.removeChild(tmp);
        cb.textContent = "✅ Đã sao chép!";
        setTimeout(() => { cb.textContent = "📋 Sao chép Key"; }, 2000);
      }
    }
  </script>
</body>
</html>
